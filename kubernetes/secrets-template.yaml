apiVersion: v1
kind: Secret
metadata:
  name: legacyadmin-secrets
type: Opaque
stringData:
  database-url: "postgres://user:password@postgres-host:5432/legacyadmin"
  redis-url: "redis://redis-host:6379/0"
  django-secret-key: "replace-with-your-secure-key"
  openai-api-key: "replace-with-your-api-key"
  aws-access-key-id: "replace-with-your-access-key"
  aws-secret-access-key: "replace-with-your-secret-key"
  aws-storage-bucket-name: "your-s3-bucket-name"
  email-host: "smtp.example.com"
  email-host-user: "user@example.com"
  email-host-password: "your-email-password"
  twilio-account-sid: "your-twilio-sid"
  twilio-auth-token: "your-twilio-token"
