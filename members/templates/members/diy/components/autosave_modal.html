{% load static %}

<!-- Auto-save Modal Component -->
<div x-data="autoSaveModal()" 
     x-init="init()" 
     x-show="isOpen" 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 transform scale-90"
     x-transition:enter-end="opacity-100 transform scale-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 transform scale-100"
     x-transition:leave-end="opacity-0 transform scale-90"
     class="fixed inset-0 z-50 overflow-y-auto" 
     aria-labelledby="modal-title" 
     role="dialog" 
     aria-modal="true"
     style="display: none;">
    
    <!-- Modal backdrop -->
    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"></div>
    
    <!-- Modal content -->
    <div class="flex items-end sm:items-center justify-center min-h-full p-4 text-center sm:p-0">
        <div class="relative bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:max-w-lg sm:w-full">
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="sm:flex sm:items-start">
                    <div class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 sm:mx-0 sm:h-10 sm:w-10">
                        <i class="fas fa-save text-blue-600"></i>
                    </div>
                    <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
                        <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title" x-text="title">
                            Auto-save Information
                        </h3>
                        <div class="mt-2">
                            <p class="text-sm text-gray-500" x-text="message">
                                Your application is being auto-saved.
                            </p>
                            
                            <!-- Progress indicator (only shown during saving) -->
                            <div x-show="showProgress" class="mt-4">
                                <div class="w-full bg-gray-200 rounded-full h-2.5">
                                    <div class="bg-blue-600 h-2.5 rounded-full" x-bind:style="'width: ' + progress + '%'"></div>
                                </div>
                                <p class="text-xs text-gray-500 mt-1 text-center" x-text="progressText">Saving...</p>
                            </div>
                            
                            <!-- Success message -->
                            <div x-show="showSuccess" class="mt-4 p-3 bg-green-50 border border-green-200 rounded-md">
                                <div class="flex">
                                    <div class="flex-shrink-0">
                                        <i class="fas fa-check-circle text-green-400"></i>
                                    </div>
                                    <div class="ml-3">
                                        <p class="text-sm font-medium text-green-800" x-text="successMessage">
                                            Your application has been saved successfully.
                                        </p>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Error message -->
                            <div x-show="showError" class="mt-4 p-3 bg-red-50 border border-red-200 rounded-md">
                                <div class="flex">
                                    <div class="flex-shrink-0">
                                        <i class="fas fa-exclamation-circle text-red-400"></i>
                                    </div>
                                    <div class="ml-3">
                                        <p class="text-sm font-medium text-red-800" x-text="errorMessage">
                                            There was an error saving your application.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                <button x-show="showCloseButton" 
                        type="button" 
                        class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:ml-3 sm:w-auto sm:text-sm"
                        @click="close()">
                    Close
                </button>
                <button x-show="showResumeButton" 
                        type="button" 
                        class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm"
                        @click="resumeApplication()">
                    Resume Application
                </button>
                <button x-show="showContinueButton" 
                        type="button" 
                        class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm"
                        @click="continueApplication()">
                    Continue
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function autoSaveModal() {
        return {
            isOpen: false,
            title: 'Auto-save Information',
            message: 'Your application is being auto-saved.',
            showProgress: false,
            progress: 0,
            progressText: 'Saving...',
            showSuccess: false,
            successMessage: 'Your application has been saved successfully.',
            showError: false,
            errorMessage: 'There was an error saving your application.',
            showCloseButton: true,
            showResumeButton: false,
            showContinueButton: false,
            applicationToken: null,
            resumeUrl: null,
            
            init() {
                // Listen for auto-save events
                window.addEventListener('autosave:start', (event) => {
                    this.showSaving();
                });
                
                window.addEventListener('autosave:success', (event) => {
                    this.showSaved(event.detail);
                });
                
                window.addEventListener('autosave:error', (event) => {
                    this.showError(event.detail);
                });
                
                window.addEventListener('autosave:resume', (event) => {
                    this.showResume(event.detail);
                });
            },
            
            showSaving() {
                this.isOpen = true;
                this.title = 'Saving Your Application';
                this.message = 'Please wait while we save your progress...';
                this.showProgress = true;
                this.showSuccess = false;
                this.showError = false;
                this.showCloseButton = false;
                this.showResumeButton = false;
                this.showContinueButton = false;
                
                // Simulate progress
                this.progress = 0;
                this.progressText = 'Saving...';
                
                const interval = setInterval(() => {
                    if (this.progress < 90) {
                        this.progress += 10;
                        this.progressText = `Saving... ${this.progress}%`;
                    } else {
                        clearInterval(interval);
                    }
                }, 200);
            },
            
            showSaved(detail) {
                this.progress = 100;
                this.progressText = 'Saved!';
                
                setTimeout(() => {
                    this.showProgress = false;
                    this.showSuccess = true;
                    this.applicationToken = detail.token;
                    
                    // If this is a save-for-later action, show different content
                    if (detail.saveForLater) {
                        this.title = 'Application Saved for Later';
                        this.message = 'Your application has been saved and can be resumed later.';
                        
                        // Create a shareable link
                        const resumeUrl = detail.resumeUrl || `/members/diy/resume/${detail.token}/`;
                        this.resumeUrl = resumeUrl;
                        
                        // Display token and link
                        this.successMessage = `
                            <div class="mb-4">
                                <p class="mb-2">Your application token:</p>
                                <div class="bg-gray-100 p-2 rounded font-mono text-sm break-all">${detail.token}</div>
                            </div>
                            <div>
                                <p class="mb-2">Resume link:</p>
                                <div class="bg-gray-100 p-2 rounded text-sm break-all">
                                    <a href="${resumeUrl}" class="text-blue-600 hover:underline">${resumeUrl}</a>
                                </div>
                                <button id="copy-link-btn" class="mt-2 text-xs bg-gray-200 hover:bg-gray-300 text-gray-800 py-1 px-2 rounded inline-flex items-center">
                                    <i class="fas fa-copy mr-1"></i> Copy Link
                                </button>
                            </div>
                        `;
                        
                        // Set up copy button functionality after rendering
                        setTimeout(() => {
                            const copyBtn = document.getElementById('copy-link-btn');
                            if (copyBtn) {
                                copyBtn.addEventListener('click', () => {
                                    navigator.clipboard.writeText(resumeUrl)
                                        .then(() => {
                                            copyBtn.innerHTML = '<i class="fas fa-check mr-1"></i> Copied!';
                                            setTimeout(() => {
                                                copyBtn.innerHTML = '<i class="fas fa-copy mr-1"></i> Copy Link';
                                            }, 2000);
                                        })
                                        .catch(err => console.error('Failed to copy link:', err));
                                });
                            }
                        }, 100);
                        
                        this.showCloseButton = true;
                        this.showContinueButton = false;
                        this.showResumeButton = true;
                    } else {
                        // Regular auto-save success
                        this.title = 'Application Saved';
                        this.message = 'Your application has been saved successfully.';
                        this.successMessage = `Last saved at ${new Date().toLocaleTimeString()}`;
                        this.showCloseButton = true;
                        this.showContinueButton = true;
                        this.showResumeButton = false;
                    }
                }, 500);
            },
            
            showError(detail) {
                this.isOpen = true;
                this.title = 'Error Saving Application';
                this.message = 'There was a problem saving your application.';
                this.showProgress = false;
                this.showSuccess = false;
                this.showError = true;
                this.errorMessage = detail.message || 'Please try again or contact support if the problem persists.';
                this.showCloseButton = true;
                this.showResumeButton = false;
                this.showContinueButton = false;
            },
            
            showResume(detail) {
                this.isOpen = true;
                this.title = 'Resume Your Application';
                this.message = 'We found a previously saved application. Would you like to resume where you left off?';
                this.showProgress = false;
                this.showSuccess = true;
                this.showError = false;
                
                // Format the time information
                const formattedDate = detail.formattedDate || new Date(detail.lastSaved).toLocaleDateString();
                const formattedTime = detail.formattedTime || new Date(detail.lastSaved).toLocaleTimeString();
                const hoursSince = detail.hoursSince || 'unknown';
                const currentStep = detail.currentStep || '?';
                
                // Create a more detailed message with application info
                this.successMessage = `
                    <div class="bg-blue-50 border border-blue-200 rounded-md p-4 mb-4">
                        <div class="flex items-center mb-2">
                            <i class="fas fa-info-circle text-blue-500 mr-2"></i>
                            <span class="font-medium">Application Details</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div>
                                <span class="text-gray-600">Last saved:</span>
                                <span class="font-medium">${formattedDate} at ${formattedTime}</span>
                            </div>
                            <div>
                                <span class="text-gray-600">Time since update:</span>
                                <span class="font-medium">${hoursSince} hours ago</span>
                            </div>
                            <div>
                                <span class="text-gray-600">Current step:</span>
                                <span class="font-medium">Step ${currentStep} of 7</span>
                            </div>
                            <div>
                                <span class="text-gray-600">Application token:</span>
                                <span class="font-mono text-xs">${detail.token}</span>
                            </div>
                        </div>
                    </div>
                `;
                
                this.showCloseButton = true;
                this.showResumeButton = true;
                this.showContinueButton = false;
                this.applicationToken = detail.token;
                this.resumeUrl = detail.resumeUrl;
            },
            
            close() {
                this.isOpen = false;
            },
            
            resumeApplication() {
                if (this.resumeUrl) {
                    window.location.href = this.resumeUrl;
                } else if (this.applicationToken) {
                    window.location.href = `/members/diy/resume/${this.applicationToken}/`;
                } else {
                    this.close();
                }
            },
            
            continueApplication() {
                this.close();
            }
        };
    }
</script>
