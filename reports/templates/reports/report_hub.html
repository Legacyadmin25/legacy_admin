{% extends 'base.html' %}

{% block content %}
<div class="space-y-6" x-data="{ selectedReport: '{{ selected_report }}' }">
  <div>
    <h1 class="text-2xl font-semibold text-gray-900">Reports</h1>
    <p class="mt-1 text-sm text-gray-600">Choose one operational report and apply filters from this page.</p>
  </div>

  <form method="get" class="space-y-4">
    <input type="hidden" name="generate" value="1">

    <section class="rounded-lg border border-emerald-200 overflow-hidden bg-white shadow-sm">
      <div class="bg-emerald-500 px-4 py-3 text-sm font-semibold text-white">Generate Report</div>
      <div class="grid grid-cols-1 gap-4 p-6 md:grid-cols-2">
        <div>
          <label for="scheme" class="block text-sm font-medium text-gray-700 mb-1">Scheme</label>
          <select name="scheme" id="scheme" class="w-full border rounded-md px-3 py-2">
            <option value="">All Schemes</option>
            {% for scheme in schemes %}
              <option value="{{ scheme.id }}" {% if scheme.id|stringformat:'s' == filter_scheme|stringformat:'s' %}selected{% endif %}>{{ scheme.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="agent" class="block text-sm font-medium text-gray-700 mb-1">Underwriter</label>
          <select name="agent" id="agent" class="w-full border rounded-md px-3 py-2">
            <option value="">All Underwriters</option>
            {% for agent in agents %}
              <option value="{{ agent.id }}" {% if agent.id|stringformat:'s' == filter_agent|stringformat:'s' %}selected{% endif %}>{{ agent.full_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="report_type" class="block text-sm font-medium text-gray-700 mb-1">Report Type</label>
          <select id="report_type" class="w-full border rounded-md px-3 py-2" disabled>
            <option selected>Operational Reports</option>
          </select>
        </div>
        <div>
          <label for="report" class="block text-sm font-medium text-gray-700 mb-1">Report</label>
          <select name="report" id="report" x-model="selectedReport" class="w-full border rounded-md px-3 py-2">
            {% for option in report_options %}
              <option value="{{ option.key }}" {% if option.key == selected_report %}selected{% endif %}>{{ option.label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </section>

    <section class="rounded-lg border border-emerald-200 overflow-hidden bg-white shadow-sm">
      <div class="bg-emerald-500 px-4 py-3 text-sm font-semibold text-white">Filter Report</div>
      <div class="grid grid-cols-1 gap-4 p-6 md:grid-cols-2">
        <div>
          <label for="branch" class="block text-sm font-medium text-gray-700 mb-1">Branch Name</label>
          <select name="branch" id="branch" class="w-full border rounded-md px-3 py-2">
            <option value="">All Branches</option>
            {% for branch in branches %}
              <option value="{{ branch.id }}" {% if branch.id|stringformat:'s' == filter_branch|stringformat:'s' %}selected{% endif %}>{{ branch.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="search" class="block text-sm font-medium text-gray-700 mb-1">Search</label>
          <input type="text" name="search" id="search" value="{{ search_term }}" placeholder="Search member, policy, or membership" class="w-full border rounded-md px-3 py-2">
        </div>
        <div x-show="selectedReport === 'all_members'" x-cloak>
          <label for="status" class="block text-sm font-medium text-gray-700 mb-1">Policy Status</label>
          <select name="status" id="status" class="w-full border rounded-md px-3 py-2">
            <option value="" {% if not filter_status %}selected{% endif %}>All</option>
            <option value="active" {% if filter_status == 'active' %}selected{% endif %}>Active</option>
            <option value="lapsed" {% if filter_status == 'lapsed' %}selected{% endif %}>Lapsed</option>
          </select>
        </div>
        <div x-show="selectedReport === 'payment_admin' || selectedReport === 'payment_scheme'" x-cloak>
          <label for="cover_month" class="block text-sm font-medium text-gray-700 mb-1">Cover Month</label>
          <input type="month" name="cover_month" id="cover_month" value="{{ cover_month|date:'Y-m' }}" class="w-full border rounded-md px-3 py-2">
        </div>
        <div x-show="selectedReport === 'amendments'" x-cloak>
          <label for="start_date" class="block text-sm font-medium text-gray-700 mb-1">Date From</label>
          <input type="date" name="start_date" id="start_date" value="{{ start_date }}" class="w-full border rounded-md px-3 py-2">
        </div>
        <div x-show="selectedReport === 'amendments'" x-cloak>
          <label for="end_date" class="block text-sm font-medium text-gray-700 mb-1">Date To</label>
          <input type="date" name="end_date" id="end_date" value="{{ end_date }}" class="w-full border rounded-md px-3 py-2">
        </div>
        <div x-show="selectedReport === 'amendments'" x-cloak>
          <label for="source" class="block text-sm font-medium text-gray-700 mb-1">Source</label>
          <select name="source" id="source" class="w-full border rounded-md px-3 py-2">
            <option value="" {% if not source %}selected{% endif %}>All Sources</option>
            <option value="import" {% if source == 'import' %}selected{% endif %}>Import Amendments</option>
            <option value="audit" {% if source == 'audit' %}selected{% endif %}>Audit Updates</option>
          </select>
        </div>
      </div>
    </section>

    <section class="rounded-lg border border-emerald-200 overflow-hidden bg-white shadow-sm">
      <div class="grid grid-cols-1 gap-4 p-6 md:grid-cols-2">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Report Export Type</label>
          <select class="w-full border rounded-md px-3 py-2" disabled>
            <option selected>Available on result screen</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Send Email</label>
          <input type="email" disabled placeholder="Available on result screen" class="w-full rounded-md border bg-gray-50 px-3 py-2 text-gray-400">
        </div>
        <div class="md:col-span-2 grid grid-cols-1 gap-4 md:grid-cols-[1fr_auto] md:items-end">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Selected Report</label>
            <div class="rounded-md border border-gray-200 bg-gray-50 px-3 py-2 text-sm text-gray-700">{{ selected_report_description }}</div>
          </div>
          <div class="flex items-center justify-end gap-3">
            <a href="{% url 'reports:report_hub' %}" class="inline-flex items-center rounded-md border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Reset</a>
            <button type="submit" class="inline-flex items-center rounded-md bg-emerald-500 px-5 py-2 text-sm font-medium text-white hover:bg-emerald-600">Generate Report</button>
          </div>
        </div>
      </div>
    </section>
  </form>
</div>
{% endblock %}
